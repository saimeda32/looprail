# Generated by `looprail init --from-spec SPEC.md` (then hand-tuned): the
# planner maps EVERY spec requirement to implementing + verifying nodes and
# ends its plan with a requirement-coverage list; an independent critic
# re-reads the spec itself and fails on uncovered requirements; you approve
# the plan at the gate before anything executes.
name: implement-spec
goal: |
  Implement the spec at SPEC.md. Read it before anything else - it is the
  source of truth. Done means every requirement in the spec is implemented
  and verified by a real test or a critic.

agents:
  planner:  { adapter: copilot-cli, model: claude-sonnet-5, permissions: safe }
  reviewer: { adapter: copilot-cli, model: gpt-5.3-codex, permissions: safe }  # independent reviewer - a different model catches what the planner misses

graph:
  plan:
    role: planner
    agent: planner
    generates: graph
    prompt: |
      Read the spec at SPEC.md and this repo's structure. Propose a graph
      that implements EVERY requirement in the spec - executors for the
      work, a real tester (npm test), and critics on the built work.
      End the plan with a "Requirement coverage" list mapping each spec
      requirement to the node(s) that implement it and the node that
      verifies it, so the reviewer can check nothing was dropped.
  review:
    role: critic
    agent: reviewer
    of: plan
    after: plan
    prompt: |
      Read the spec at SPEC.md yourself, then check the proposed graph
      covers EVERY requirement. Fail with the exact list of uncovered or
      unverified requirements if any is missing an implementing node or a
      downstream verifier.
  approve: { role: gate, after: review }

rails:
  max_iterations: 12
  max_cost_usd: 20
  max_wall_minutes: 90
  replan_limit: 3
  gate_timeout: 600

verdict: { policy: all-pass }
