name: consolidate-dashboard-servers
goal: |
  Real bug reproduced live this session: there are TWO separate dashboard
  server implementations (src/dashboard/server.ts for a standalone single
  run, src/dashboard/mission-control-server.ts for the multi-run index AND
  its own per-run nested view), and they have already drifted apart. The
  multi-run one was fixed earlier to re-read a run's persisted loopfile.json
  fresh on every request (surviving a splice extending the graph mid-run);
  the standalone one never got that fix - it freezes the graph/edges at
  whatever the loopfile looked like when the dashboard process started, so
  a self-planning splice that happens later never shows up in a standalone
  `looprail run --ui` dashboard's DAG. Two implementations of "serve this
  run's dashboard" is exactly how that class of bug happens, and exactly
  how it'll happen again.

  KEEP THIS SIMPLE - do not build a new abstraction layer, a plugin system,
  or a generalized "dashboard adapter" interface. The fix is: stop having
  two implementations. `looprail run --ui`, `looprail ui <runId>`, and
  `looprail ui --all` should all be served by mission-control-server.ts's
  existing code, not by a second, separately-maintained server.

  Read src/dashboard/server.ts, src/dashboard/mission-control-server.ts,
  src/cli/ui-cmd.ts (uiAction, uiAllAction, loadExpandedLoopDef), and
  src/cli/run-cmd.ts (executeRun's `if (opts.ui)` block) fully first - this
  needs real understanding of how each currently wires def/journalPath/
  onResume/gate lookups, not a guessed quick fix.

  THE ONE THING THAT MUST NOT REGRESS, and needs real design attention (do
  not hand-wave this): gate approval and resume/pause/cancel currently work
  for `looprail run --ui` because the dashboard server runs in the SAME
  PROCESS as the actual loop (the in-memory gate registry and the direct
  resumeAction call both resolve correctly within one process). Mission
  control's OWN existing resumeFor closures (in uiAllAction) call
  resumeAction as a fresh invocation against a run that already halted in a
  DIFFERENT, now-dead process - that's a different case than "control a run
  that is STILL ACTIVELY RUNNING in THIS SAME process". Design how
  mission-control-server.ts (or a thin wrapper around it) gets wired, when
  started via `run --ui`, to the real in-process gate registry and a direct
  resumeAction call for the run it's watching - not just the dead-process
  resume path it already has. Prove this works with a real test that
  approves a gate through the consolidated server while the loop is still
  running in the same process, not just that the page renders.

  Once server.ts's dashboard is no longer a separate implementation, verify
  the earlier bug is actually fixed: a run that splices its graph mid-run
  (self-planning) must show the updated graph/edges immediately in
  whichever command opened the dashboard, `run --ui` included - write a
  regression test for exactly this, reusing the existing splice-persistence
  test fixtures if there are any (search for them first).

  Update README.md's "Watching a run" and "Mission control" sections to
  describe the new, single dashboard reality accurately - there is no
  longer a separate "standalone dashboard" concept to describe. Don't
  invent new terminology; match this project's existing documentation
  tone and section structure.

  Done means: TDD throughout, the gate/resume-in-same-process behavior is
  proven by a real test (not just "the old tests still pass" - write one
  that would have failed against the OLD server.ts-based wiring), the
  splice-staleness bug is proven fixed with a regression test, README is
  updated, and the full existing test suite (`npx vitest run`, no path
  filter) plus `npx tsc --noEmit` both pass clean.

agents:
  planner:  { adapter: copilot-cli, model: claude-opus-4.8 }
  reviewer: { adapter: copilot-cli, model: claude-sonnet-5 }
  worker:   { adapter: copilot-cli, model: claude-sonnet-5 }
  checker:  { adapter: copilot-cli, model: claude-sonnet-5 }

graph:
  plan:
    role: planner
    agent: planner
    generates: graph
    prompt: >
      Read the goal above and every real file it names before proposing
      anything - this is a real architectural consolidation, not a guessed
      quick fix, but it must also stay SIMPLE: no new abstraction layers
      beyond what's strictly needed to have ONE dashboard-server
      implementation instead of two. Propose a graph of nodes (agents,
      dependencies, testers, critics) using the REAL NodeDef schema (role,
      agent, prompt/run/expect, after) that removes server.ts as a separate
      implementation, wires run --ui / ui <runId> / ui --all all through
      mission-control-server.ts, and specifically designs (and proves with
      a real test) how gate approval and resume/pause/cancel keep working
      for a run still actively executing in the SAME process. Reuse the
      worker/checker agent keys already declared above for the actual
      implementation work - the planning/review roles (planner, reviewer)
      are for THIS planning step only.
  review:
    role: critic
    agent: reviewer
    of: plan
    after: plan
    prompt: >
      Check four things equally strictly - (1) every proposed node uses the
      REAL NodeDef schema, not invented fields; (2) the plan does not
      introduce unnecessary abstraction - it should read as "delete one
      implementation, wire the CLI commands to the other", not a new
      generalized dashboard framework; (3) the in-process gate/resume
      design is concrete and testable, not hand-waved - could you actually
      point to which test proves a gate can be approved on a run still
      executing in the same process through the consolidated server?; (4)
      the plan includes updating README.md's dashboard-related sections to
      match the new reality. Fail if any of these four is hand-waved.
  approve:
    role: gate
    after: review

rails:
  max_iterations: 12
  max_cost_usd: 20
  max_wall_minutes: 60
  replan_limit: 3
  gate_timeout: 1800

verdict: { policy: all-pass }
