name: cited-research-report-looprail
goal: |
  Produce a short research report where every factual claim is cited to a
  real, checkable source. (Looprail: a plan reviewed up front, a two-model
  critic panel reviews the draft for unsupported claims.)
agents:
  worker:  { adapter: mock }
  checker: { adapter: mock }
  skeptic: { adapter: mock }
graph:
  plan:      { role: planner, agent: worker }
  plan-crit: { role: critic, agent: checker, of: plan, after: plan }
  draft:     { role: executor, agent: worker, after: plan-crit }
  crit:      { role: critic, of: draft, after: draft, panel: [checker, skeptic] }
  merge:     { role: synthesizer, agent: checker, after: crit }
rails:
  max_iterations: 4
  max_cost_usd: 5
  stall_after: 3
verdict: { policy: all-pass }
